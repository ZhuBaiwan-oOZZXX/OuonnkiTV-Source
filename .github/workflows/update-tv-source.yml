name: Update TV Source

on:
  schedule:
    - cron: "0 22 * * *" # 每天北京时间早上6点运行 (UTC 22点)
  workflow_dispatch: # 支持手动触发

jobs:
  update-tv-source:
    runs-on: ubuntu-latest

    permissions:
      contents: write # 允许推送

    steps:
      # 1️⃣ 检出仓库
      - uses: actions/checkout@v4

      # 2️⃣ 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      # 3️⃣ 安装依赖
      - name: Install dependencies
        run: npm install

      # 4️⃣ 运行一键脚本
      - name: Run start script
        run: node start.js

      # 5️⃣ 提交并推送生成的文件
      - name: Commit and push changes
        run: |
          # 检查是否有文件变化
          if [ -z "$(git status --porcelain tv_source/)" ]; then
            echo "✅ 数据源没有变化，无需提交"
            exit 0
          fi

          # 配置 Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 添加所有生成的文件
          git add tv_source/

          # 提交更新
          git commit -m "自动更新 TV 源数据 ($(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M:%S CST'))"

          # 推送到远程 main 分支
          git push https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git HEAD:main

      # 6️⃣ 上传 JSON 到 Cloudflare R2
      - name: Upload to Cloudflare R2
        run: |
          npx wrangler r2 object put phimhay-sources/full.json --file=tv_source/OuonnkiTV/full.json --content-type=application/json
          npx wrangler r2 object put phimhay-sources/full-noadult.json --file=tv_source/OuonnkiTV/full-noadult.json --content-type=application/json
          npx wrangler r2 object put phimhay-sources/lite.json --file=tv_source/OuonnkiTV/lite.json --content-type=application/json
          npx wrangler r2 object put phimhay-sources/adult.json --file=tv_source/OuonnkiTV/adult.json --content-type=application/json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
